# Minimal kitty config; theme is generated by ~/.local/bin/eink-wallpaper
include ~/.config/kitty/colors-eink.conf

# Keep kitty background solid (prevents wallpaper tinting the terminal).
background_opacity 1.0
window_padding_width 10
font_size 11.0

# Contrast overrides (stay readable regardless of generated theme).
background #000000
foreground #e8e6e3
cursor #e8e6e3
selection_background #2b2a28
selection_foreground #e8e6e3
