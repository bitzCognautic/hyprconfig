# Quickshell bar (no-duplicate + daemonize)
exec-once = quickshell -n -d

# Restore wallpaper + regenerate theme on login (no-op if not set)
exec-once = ~/.local/bin/eink-wallpaper --restore

# Idle (dim/sleep)
exec-once = ~/.local/bin/eink-hypridle-apply --start

# Night light: handled by QuickSettings (wlsunset/gammastep fallback)

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# --- Rice (look & feel) ---

# General layout
general {
    gaps_in = 6
    gaps_out = 10
    border_size = 2
    # Will be overridden dynamically by ~/.local/bin/eink-wallpaper to match the current accent.
    col.active_border = rgba(ffffffff) rgba(ffffff99) 45deg
    col.inactive_border = rgba(2b2a28cc)
    layout = dwindle
    allow_tearing = false
}

# Input
input {
    touchpad {
        natural_scroll = true
    }
}

# Rounded corners + blur + shadow
decoration {
    rounding = 16
    active_opacity = 0.92
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

# Animations
animations {
    enabled = true

    bezier = easeOutCubic, 0.22, 1.0, 0.36, 1.0
    bezier = easeInOut, 0.65, 0.0, 0.35, 1.0

    animation = windows, 1, 4, easeOutCubic, slide
    animation = windowsOut, 1, 4, easeOutCubic, slide
    animation = layers, 1, 4, easeOutCubic, slide
    animation = layersOut, 1, 4, easeOutCubic, slide
    animation = border, 1, 6, easeOutCubic
    animation = fade, 1, 3, easeInOut
    animation = workspaces, 1, 4, easeOutCubic, slide
}

# Dwindle tweaks
dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.90
}

# Misc polish
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Layer rules (swaync panel)
# Only swaync should slide from the right; keep quickshell layers using their own top-slide.
layerrule = animation slide right, match:namespace swaync-control-center
layerrule = animation slide right, match:namespace swaync-notification-window

# Ensure quickshell layers don't inherit the global layer animation direction.
layerrule = animation slide top, match:namespace eink-.*

# Keybinds
bind = $mod, T, exec, kitty
bind = $mod, Q, killactive,
bind = $mod, E, exec, dolphin
bind = $mod, W, exec, sh -lc 'command -v brave >/dev/null 2>&1 && exec brave || exec brave-browser'
bind = $mod, L, exec, hyprlock

# Mouse wheel workspace switching / moving windows
# Caelestia-style scroll direction:
# - `mouse_down` (wheel down) -> next workspace
# - `mouse_up`   (wheel up)   -> previous workspace
#
# Use `±1` so it also scrolls through empty workspaces (i.e. "infinite" numbered workspaces).
bind = $mod, mouse_down, workspace, -1
bind = $mod, mouse_up, workspace, +1

# Move focused window to adjacent workspace.
bind = $mod ALT, mouse_down, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent -1; hyprctl dispatch workspace -1'
bind = $mod ALT, mouse_up, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent +1; hyprctl dispatch workspace +1'
bind = $mod SHIFT, mouse_down, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent -1; hyprctl dispatch workspace -1'
bind = $mod SHIFT, mouse_up, exec, sh -lc 'hyprctl dispatch movetoworkspacesilent +1; hyprctl dispatch workspace +1'

binds {
    # Prevent multi-trigger per wheel notch (fixes "flicker"/skipping on some mice).
    scroll_event_delay = 120
}

# Screenshots (Wayland)
# Selection: SUPER+SHIFT+S
bind = $mod SHIFT, S, exec, sh -lc 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/$(date +%Y-%m-%d_%H-%M-%S)_selection.png"; grim -g "$(slurp)" "$file" && wl-copy < "$file"'
# Fullscreen: PrintScreen
bind = , Print, exec, sh -lc 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/$(date +%Y-%m-%d_%H-%M-%S)_fullscreen.png"; grim "$file" && wl-copy < "$file"'

# Color picker: SUPER+SHIFT+C (copies hex and notifies via swaync/notify-send)
bind = $mod SHIFT, C, exec, sh -lc 'hex="$(hyprpicker -f hex 2>/dev/null)" || exit 0; [ -n "$hex" ] || exit 0; printf "%s" "$hex" | wl-copy; notify-send -a eink -u low "Copied hex" "Copied $hex to clipboard"'

# Notifications: open swaync control center
bind = $mod, N, exec, swaync-client -t -sw

# Launcher (rofi)
# True "Super tap" without breaking Super+shortcuts isn't reliably possible in Hyprland alone.
# Use an explicit chord.
bind = $mod, Space, exec, rofi -show drun

# Clipboard (cliphist + rofi): SUPER+V
bind = $mod, V, exec, sh -lc 'cliphist list | rofi -dmenu -i -p clipboard | cliphist decode | wl-copy'
